server:
  port: 7374

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/semo_monitor?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: "ENC(i2FqVCEo0lrT2VThFXyu/A==)"
    password: "ENC(cG5TIPD0PLusPpegeKp0siKMWlGeuX3L)"
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
  messages:
    encoding: UTF-8

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD}
    bean: jasyptStringEncryptor
    property:
      prefix: "ENC("
      suffix: ")"
    algorithm: PBEWithMD5AndDES

logging:
  level:
    root: info
    com.semo.monitor: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/semo-monitor.log